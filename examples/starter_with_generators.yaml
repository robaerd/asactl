version: 1
kind: Config
campaign_group:
  id: "YOUR_CAMPAIGN_GROUP_ID"
auth:
  profile: default
app:
  name: HabitFlow
  app_id: "YOUR_APP_ID"
defaults:
  currency: USD
  devices:
    - IPHONE
generators:
  - name: discovery-block-exact-campaigns
    kind: KeywordToNegative
    spec:
      source_refs:
        campaigns:
          - US - Brand - Exact
          - US - Category - Exact
          - US - Routine - Exact
      target_ref:
        campaign: US - Discovery
      filters:
        keyword_match_types:
          - EXACT
      generate:
        campaign_negative_keywords:
          match_type: EXACT
          status: ACTIVE
campaigns:
  - name: US - Brand - Exact
    storefronts:
      - US
    daily_budget: 1.50
    status: ACTIVE
    adgroups:
      - name: Brand
        status: ACTIVE
        default_cpt_bid: 0.90
        targeting: KEYWORDS
        keywords:
          - { text: habitflow,     match_type: EXACT, bid: 1.10, status: ACTIVE }
          - { text: habit flow,    match_type: EXACT, bid: 0.90, status: ACTIVE }
          - { text: habitflow app, match_type: EXACT, bid: 0.90, status: ACTIVE }
  - name: US - Category - Exact
    storefronts:
      - US
    daily_budget: 2.00
    status: ACTIVE
    adgroups:
      - name: Category
        status: ACTIVE
        default_cpt_bid: 1.00
        targeting: KEYWORDS
        keywords:
          - { text: habit tracker,   match_type: EXACT, bid: 1.20, status: ACTIVE }
          - { text: streak tracker,  match_type: EXACT, bid: 1.00, status: ACTIVE }
          - { text: routine tracker, match_type: EXACT, bid: 1.00, status: ACTIVE }
  - name: US - Routine - Exact
    storefronts:
      - US
    daily_budget: 1.50
    status: ACTIVE
    adgroups:
      - name: Routines
        status: ACTIVE
        default_cpt_bid: 0.85
        targeting: KEYWORDS
        keywords:
          - { text: build habits,      match_type: EXACT, bid: 0.85, status: ACTIVE }
          - { text: daily routine app, match_type: EXACT, bid: 0.85, status: ACTIVE }
  - name: US - Discovery
    storefronts:
      - US
    daily_budget: 3.00
    status: ACTIVE
    campaign_negative_keywords:
      - { text: calendar, match_type: EXACT, status: ACTIVE }
    adgroups:
      - name: Discovery - Broad
        status: ACTIVE
        default_cpt_bid: 0.55
        targeting: KEYWORDS
        keywords:
          - { text: habit tracker,  match_type: BROAD, bid: 0.60, status: ACTIVE }
          - { text: streak tracker, match_type: BROAD, bid: 0.55, status: ACTIVE }
      - name: Discovery - Search Match
        status: ACTIVE
        default_cpt_bid: 0.45
        targeting: SEARCH_MATCH
