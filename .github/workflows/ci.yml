name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - run: go mod download
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.14.3
          args: check
      - run: test -z "$(gofmt -l cmd internal)"
      - run: go vet ./...
      - run: go test ./...
